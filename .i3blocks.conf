# i3blocks config file
#
# Please see man i3blocks for a complete reference!
# The man page is also hosted at http://vivien.github.io/i3blocks
# https://vivien.github.io/i3blocks/
# List of valid properties:
#
# align
# color
# command
# full_text
# instance
# interval
# label
# min_width
# name
# separator
# separator_block_width
# short_text
# signal
# urgent

# Global properties
#
# The top properties below are applied to every block, but can be overridden.
# Each block command defaults to the script name to avoid boilerplate.
command=/usr/share/i3blocks/$BLOCK_NAME
separator_block_width=11

#markup=none
markup=pango
color=#2666A1

[module-upgindicator]
interval=100
command=$SCRIPT_DIR/module-upgindicator
separator=true

[keyindicator]
instance=NUM
interval=once
signal=11
command=$SCRIPT_DIR/keyindicator

[keyindicator]
instance=CAPS
interval=once
signal=11
command=$SCRIPT_DIR/keyindicator

# CPU usage
# The script may be called with -w and -c switches to specify thresholds,
# see the script for details.
[gradient-temp]
label=(CPU)
interval=10
instance=k10temp-pci-00c3
command=$SCRIPT_DIR/gradient-temp

[cpu_usage]
label=
min_width=57
interval=10
min_width=CPU:100%
separator=true
command=$SCRIPT_DIR/cpu_usage

# Memory usage
# The type defaults to "mem" if the instance is not specified.
[memory]
label=
min_width=37
separator=false
interval=30
command=$SCRIPT_DIR/memory

[memory]
label=Swp
min_width=37
instance=mem
separator=true
interval=30

[gradient-temp]
label=(GPU)
interval=10
instance=amdgpu-pci-0300
command=$SCRIPT_DIR/gradient-temp

# Disk usage
[gradient-temp]
label=(NVME)
align=center
interval=10
instance=nvme-pci-0200
command=$SCRIPT_DIR/gradient-temp

[disk]
label=💽/var
instance=/var
interval=30
separator=false

[disk]
label=📂/home
instance=/home
interval=30
separator=true

[module-calculator]
interval=once
separator=true
command=$SCRIPT_DIR/module-calculator

[module-calendar]
interval=60
command=$SCRIPT_DIR/module-calendar

# [volume]
# instance=Master
# min_width=57
# align=center
# interval=once
# command=$SCRIPT_DIR/module-volume
# signal=10

# [module-mic]
# align=center
# min_width=57
# interval=once
# command=$SCRIPT_DIR/module-mic

# Network interface monitoring
[iface]
interval=60
separator=false
align=center
command=$SCRIPT_DIR/iface

[bandwidth]
label=
min_width=75
interval=2
signal=10
align=center
separator=true

[wifi]
label=📶
interval=10
separator=true
align=center

[battery]
label=🔋
instance=1
interval=30
command=$SCRIPT_DIR/battery
separator=true
command=$SCRIPT_DIR/wifi
